# TAILRD Synthea Configuration — Mount Sinai Cardiovascular Population
# Generates cardiovascular-enriched synthetic patient population

exporter.fhir.export = true
exporter.fhir.use_us_core_ig = true
exporter.hospital.fhir.export = true
exporter.practitioner.fhir.export = true

# Population
generate.default_population = 10000

# Geographic — New York City
generate.demographics.default_file = demographics.csv
generate.geography.zipcodes.default_file = zipcodes.csv

# Override to NYC demographics
generate.demographics.city = New York
generate.demographics.state = New York

# Age distribution — skewed older for cardiovascular population
# 55-64: 20%, 65-74: 35%, 75-84: 30%, 85+: 15%

# Condition prevalence overrides (higher than national for NYC/Mount Sinai)
# These values represent approximate prevalence in Mount Sinai's cardiovascular panel
generate.only_alive_patients = true

# Cardiovascular-enriched prevalence
# Heart Failure: 15% (vs 2.4% national — this is a cardiology panel, not general pop)
# Atrial Fibrillation: 12% (vs 2.7% national)
# Coronary Artery Disease: 18% (vs 6.7% national)
# Hypertension: 35% (vs 32% national — NYC higher)
# Type 2 Diabetes: 14% (vs 10% national — NYC higher)
# Aortic Stenosis: 4% (vs 2% in >65 national)
# HCM: 0.2% (1:500 prevalence)
# ATTR-CM: 0.8% (higher in Black >=60, NYC demographic)
# PAD: 6% (vs 4% national)
# CKD: 12% (vs 7% national — comorbidity with CV disease)

# Race/ethnicity distribution matching NYC demographics
# White: 32%, Black: 24%, Hispanic: 29%, Asian: 14%, Other: 1%

# Output
exporter.baseDirectory = ./output
exporter.use_uuid_filenames = true
