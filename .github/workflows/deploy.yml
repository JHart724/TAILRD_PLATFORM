name: Build & Deploy to ECS

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: tailrd-backend
  ECS_CLUSTER: tailrd-production-cluster
  ECS_SERVICE: tailrd-production-backend
  ECS_TASK_FAMILY: tailrd-backend

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ff717079ee2060e4bcee96c4779b553acc87447c # v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@f2e9fc6c2b355c1890b65e6f6f0e2ac3e6e22f78 # v2

      - name: Build, tag, and push image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd backend
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Deploy to ECS and verify
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Register new task definition with this commit's image
          aws ecs describe-task-definition \
            --task-definition $ECS_TASK_FAMILY \
            --query 'taskDefinition' \
            --output json > /tmp/taskdef.json

          python3 -c "
          import json, os
          with open('/tmp/taskdef.json') as f:
              td = json.load(f)
          td['containerDefinitions'][0]['image'] = '${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}'
          for key in ['taskDefinitionArn','revision','status','requiresAttributes',
                      'compatibilities','registeredAt','registeredBy','deregisteredAt']:
              td.pop(key, None)
          with open('/tmp/new-taskdef.json', 'w') as f:
              json.dump(td, f)
          print('Task def prepared')
          "

          NEW_TD=$(aws ecs register-task-definition \
            --cli-input-json file:///tmp/new-taskdef.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)
          echo "Registered: $NEW_TD"

          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --task-definition "$NEW_TD"

          echo "Waiting for healthy..."
          for i in $(seq 1 20); do
            sleep 15
            STATUS=$(curl -sf https://api.tailrd-heart.com/health | \
              python3 -c "import sys,json; print(json.load(sys.stdin)['data']['status'])" 2>/dev/null || echo "unavailable")
            echo "[$i/20] Health: $STATUS"
            if [ "$STATUS" = "healthy" ]; then
              echo "Deploy confirmed healthy on ${IMAGE_TAG}"
              exit 0
            fi
          done
          echo "ERROR: Deploy did not stabilize in 5 minutes"
          exit 1

  deploy-frontend:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4
        with:
          node-version: '18'
          cache: 'npm'

      - run: npm ci

      - name: Build frontend
        run: CI=false npm run build
        env:
          REACT_APP_USE_REAL_API: 'true'
          REACT_APP_API_URL: https://api.tailrd-heart.com/api
          REACT_APP_DEMO_MODE: 'false'

      - name: Deploy to Netlify
        run: npx netlify-cli@latest deploy --prod --dir=build --site ${{ secrets.NETLIFY_SITE_ID }} --auth ${{ secrets.NETLIFY_AUTH_TOKEN }}
