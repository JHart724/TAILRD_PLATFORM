name: Build & Deploy to ECS

on:
  workflow_dispatch:  # Manual trigger
  push:
    branches: [main]
    paths: ['backend/**']

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: tailrd-backend
  ECS_CLUSTER: tailrd-production-cluster
  ECS_SERVICE: tailrd-production-backend

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd backend
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Deploy to ECS and verify
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Register new task definition with this commit's image
          aws ecs describe-task-definition \
            --task-definition $ECS_SERVICE \
            --query 'taskDefinition' \
            --output json > /tmp/taskdef.json

          python3 -c "
          import json, os
          with open('/tmp/taskdef.json') as f:
              td = json.load(f)
          td['containerDefinitions'][0]['image'] = '${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}'
          for key in ['taskDefinitionArn','revision','status','requiresAttributes',
                      'compatibilities','registeredAt','registeredBy','deregisteredAt']:
              td.pop(key, None)
          with open('/tmp/new-taskdef.json', 'w') as f:
              json.dump(td, f)
          print('Task def prepared')
          "

          NEW_TD=$(aws ecs register-task-definition \
            --cli-input-json file:///tmp/new-taskdef.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)
          echo "Registered: $NEW_TD"

          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --task-definition "$NEW_TD"

          echo "Waiting for healthy..."
          for i in $(seq 1 20); do
            sleep 15
            STATUS=$(curl -sf https://api.tailrd-heart.com/health | \
              python3 -c "import sys,json; print(json.load(sys.stdin)['data']['status'])" 2>/dev/null || echo "unavailable")
            echo "[$i/20] Health: $STATUS"
            if [ "$STATUS" = "healthy" ]; then
              echo "Deploy confirmed healthy on ${IMAGE_TAG}"
              exit 0
            fi
          done
          echo "ERROR: Deploy did not stabilize in 5 minutes"
          exit 1
