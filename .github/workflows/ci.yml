name: TAILRD Platform CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '18'

jobs:
  # ─── Lint ──────────────────────────────────────────────────────────────────────
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache backend node_modules
        uses: actions/cache@v5
        with:
          path: backend/node_modules
          key: backend-deps-${{ runner.os }}-${{ hashFiles('backend/package-lock.json') }}
          restore-keys: backend-deps-${{ runner.os }}-

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run ESLint (backend)
        working-directory: backend
        run: npm run lint

  # ─── Type Check ────────────────────────────────────────────────────────────────
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache backend node_modules
        uses: actions/cache@v5
        with:
          path: backend/node_modules
          key: backend-deps-${{ runner.os }}-${{ hashFiles('backend/package-lock.json') }}
          restore-keys: backend-deps-${{ runner.os }}-

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Run tsc --noEmit (backend)
        working-directory: backend
        run: npx tsc --noEmit

  # ─── Test ──────────────────────────────────────────────────────────────────────
  test:
    name: Jest Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: tailrd_test
          POSTGRES_PASSWORD: tailrd_test_pw
          POSTGRES_DB: tailrd_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tailrd_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://tailrd_test:tailrd_test_pw@localhost:5432/tailrd_test
      JWT_SECRET: ci-test-secret-do-not-use-in-production
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache backend node_modules
        uses: actions/cache@v5
        with:
          path: backend/node_modules
          key: backend-deps-${{ runner.os }}-${{ hashFiles('backend/package-lock.json') }}
          restore-keys: backend-deps-${{ runner.os }}-

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Run database migrations
        working-directory: backend
        run: npx prisma migrate deploy

      - name: Run tests
        working-directory: backend
        run: npm test -- --ci --coverage --forceExit

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage/
          retention-days: 14

  # ─── Security Scan ─────────────────────────────────────────────────────────────
  security-scan:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Audit backend dependencies
        working-directory: backend
        run: npm audit --audit-level=high
        continue-on-error: false

  # ─── Dependency Check ──────────────────────────────────────────────────────────
  dependency-check:
    name: Dependency Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Check for lockfile consistency (backend)
        working-directory: backend
        run: npm ci --ignore-scripts

      - name: Check for outdated dependencies (backend)
        working-directory: backend
        run: npm outdated || true

      - name: Verify no extraneous dependencies (backend)
        working-directory: backend
        run: npm ls --all --json > /dev/null 2>&1 || echo "::warning::Dependency tree has issues — run npm ls locally to inspect"

  # ─── Production Deploy ─────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, security-scan, dependency-check]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://app.tailrd.com
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: Run production migrations
        working-directory: backend
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}

      - name: Deploy
        run: echo "Deploy step — configure with your hosting provider (Cloudticity / AWS)"
        # TODO: Replace with actual deployment commands
        # e.g., aws ecs update-service, docker push, etc.
