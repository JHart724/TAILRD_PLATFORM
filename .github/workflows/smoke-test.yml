name: Post-Deploy Smoke Test

on:
  workflow_run:
    workflows: ["Build & Deploy to ECS"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      simulate_failure:
        description: 'Synthetic failure to exercise the AUDIT-114 alert path (no production endpoints called). Leave false for real smoke runs.'
        type: boolean
        default: false
        required: false

env:
  API_BASE: https://api.tailrd-heart.com

jobs:
  smoke-test:
    name: Production Smoke Test
    runs-on: ubuntu-latest
    # AUDIT-114: least-privilege job-level grant so the if: failure() notify step
    # can file a smoke-failure issue with the default GITHUB_TOKEN (issues: write
    # also confers issues read for the dedup `gh issue list`). No other scope is
    # needed - the job runs no checkout and the curl probes use SMOKE_TEST_* secrets.
    permissions:
      issues: write
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      # AUDIT-114 synthetic alert-path test. Runs ONLY on manual workflow_dispatch
      # with simulate_failure=true; never on workflow_run/scheduled runs. Placed
      # FIRST so the job goes red without calling any production endpoint, letting
      # the if: failure() notify path be exercised on demand.
      - name: Simulate failure (synthetic alert-path test - dispatch-only)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.simulate_failure }}
        run: |
          echo "::error::AUDIT-114 synthetic failure (simulate_failure=true): no-op test of the if: failure() notify path. No production endpoints were called."
          exit 1

      # Window widened 2026-06-11 to match deploy.yml's stabilization gate (20 polls x 15s = 5 min);
      # the prior 2-min window (24 x 5s) false-failed on real single-task rollouts (issue #375, AUDIT-138).
      - name: Wait for ECS stabilization
        run: |
          echo "Polling for healthy status (max 5 min)..."
          for i in $(seq 1 20); do
            STATUS=$(curl -sf ${{ env.API_BASE }}/health | \
              python3 -c "import sys,json; \
              print(json.load(sys.stdin)['data']['status'])" 2>/dev/null)
            if [ "$STATUS" = "healthy" ]; then
              echo "Healthy after attempt $i"
              exit 0
            fi
            echo "Attempt $i: $STATUS - retrying in 15s"
            sleep 15
          done
          echo "FAIL: service not healthy after 5 minutes"
          exit 1

      - name: Health check
        run: |
          RESPONSE=$(curl -sf ${{ env.API_BASE }}/health)
          STATUS=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['status'])")
          echo "Health: $STATUS"
          [ "$STATUS" = "healthy" ] || exit 1

      - name: Login
        id: auth
        env:
          LOGIN_EMAIL: ${{ secrets.SMOKE_TEST_EMAIL }}
          LOGIN_PASSWORD: ${{ secrets.SMOKE_TEST_PASSWORD }}
        run: |
          # AUDIT-107: drop -f so the HTTP status is captured (not swallowed); the
          # step is self-diagnosing about WHY login failed (401 vs 500 vs 000).
          HTTP_CODE=$(curl -s -o /tmp/login.json -w '%{http_code}' -X POST ${{ env.API_BASE }}/api/auth/login \
            -H "Content-Type: application/json" \
            -d "{\"email\":\"$LOGIN_EMAIL\",\"password\":\"$LOGIN_PASSWORD\"}")
          echo "Login HTTP status: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Login failed with HTTP $HTTP_CODE (expected 200)."
            case "$HTTP_CODE" in
              401) echo "::error::401 = credentials rejected. Rotate SMOKE_TEST_* per docs/runbooks/AUDIT_107_SMOKE_ROTATION_RUNBOOK.md." ;;
              500) echo "::error::500 = server error on login (decrypt path / data-state). See AUDIT-108 + AUDIT-109." ;;
              000) echo "::error::000 = no response (DNS / network / service down)." ;;
            esac
            exit 1
          fi
          SUCCESS=$(python3 -c "import json; print(json.load(open('/tmp/login.json')).get('success', False))")
          if [ "$SUCCESS" != "True" ]; then
            echo "::error::HTTP 200 but success != True (unexpected login response shape)."
            exit 1
          fi
          TOKEN=$(python3 -c "import json; print(json.load(open('/tmp/login.json'))['data']['token'])")
          echo "Login: PASS (HTTP 200, success=True)"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Verify all 6 module dashboards
        env:
          TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          PASS=0
          FAIL=0
          for module in heart-failure electrophysiology coronary-intervention \
            structural-heart valvular-disease peripheral-vascular; do
            RESULT=$(curl -s \
              "${{ env.API_BASE }}/api/modules/$module/dashboard" \
              -H "Authorization: Bearer $TOKEN" | \
              python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          if d.get('success'):
              src=d.get('data',{}).get('source','?')
              print(f'PASS source={src}')
          else:
              print(f'FAIL: {d.get(\"error\",\"unknown\")}')
          " 2>/dev/null)
            echo "$module: $RESULT"
            if echo "$RESULT" | grep -q "^PASS"; then
              PASS=$((PASS + 1))
            else
              FAIL=$((FAIL + 1))
            fi
          done
          echo ""
          echo "Results: $PASS passed, $FAIL failed out of 6 modules"
          [ "$FAIL" -eq 0 ] || exit 1

      - name: Verify module patient endpoints
        env:
          TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          PASS=0
          FAIL=0
          for module in heart-failure electrophysiology coronary-intervention \
            structural-heart valvular-disease peripheral-vascular; do
            RESULT=$(curl -s \
              "${{ env.API_BASE }}/api/modules/$module/patients?limit=3" \
              -H "Authorization: Bearer $TOKEN" | \
              python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          if d.get('success'):
              src=d.get('source','?')
              cnt=d.get('count', len(d.get('data',[])))
              print(f'PASS count={cnt} source={src}')
          else:
              print(f'FAIL: {d.get(\"error\",\"unknown\")}')
          " 2>/dev/null)
            echo "$module/patients: $RESULT"
            if echo "$RESULT" | grep -q "^PASS"; then
              PASS=$((PASS + 1))
            else
              FAIL=$((FAIL + 1))
            fi
          done
          echo ""
          echo "Results: $PASS passed, $FAIL failed out of 6 modules"
          [ "$FAIL" -eq 0 ] || exit 1

      - name: Summary
        if: always()
        run: |
          echo "## Smoke Test Complete" >> $GITHUB_STEP_SUMMARY
          echo "- API: ${{ env.API_BASE }}" >> $GITHUB_STEP_SUMMARY
          echo "- Trigger: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Time: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY

      # AUDIT-107 blocking-posture OPTION (A) - alert-only. This notifies on a
      # failed post-deploy smoke; it does NOT gate the deploy. OPTION (B)
      # deploy-gating remains an open operator decision (see runbook). Deduped:
      # at most one open smoke-failure issue at a time (avoids run-per-failure spam).
      - name: Notify on smoke failure (AUDIT-107 alert-only)
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # AUDIT-114 mechanism 2: this job runs no actions/checkout, so there is
          # no local git remote for `gh` to resolve the repo from - `gh issue
          # list`/`create` would fail with "not a git repository" (NOT a 403; the
          # issues: write grant is fine). GH_REPO gives gh explicit repo context
          # for both the dedup list and the create. Exposed by the rung-1 synthetic
          # verification once the `|| echo` swallow was removed.
          GH_REPO: ${{ github.repository }}
        run: |
          EXISTING=$(gh issue list --state open --search "Post-deploy smoke test FAILED in:title" --json number --jq 'length' 2>/dev/null || echo "")
          if [ -n "$EXISTING" ] && [ "$EXISTING" != "0" ]; then
            echo "An open smoke-failure issue already exists; not duplicating."
            exit 0
          fi
          # AUDIT-114: no `|| echo` swallow - if `gh issue create` fails (e.g. a
          # missing issues: write grant), the step fails LOUDLY rather than masking
          # the alert gap as a green step.
          gh issue create \
            --title "Post-deploy smoke test FAILED on main" \
            --body "The Post-Deploy Smoke Test failed. Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          AUDIT-107 alert-only posture: this notifies but does NOT gate the deploy. Deploy-gating (option B) is a deferred operator decision. See docs/runbooks/AUDIT_107_SMOKE_ROTATION_RUNBOOK.md."
