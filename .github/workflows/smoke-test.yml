name: Post-Deploy Smoke Test

on:
  workflow_run:
    workflows: ["Build & Deploy to ECS"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

env:
  API_BASE: https://api.tailrd-heart.com

jobs:
  smoke-test:
    name: Production Smoke Test
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Wait for ECS stabilization
        run: |
          echo "Polling for healthy status (max 2 min)..."
          for i in $(seq 1 24); do
            STATUS=$(curl -sf ${{ env.API_BASE }}/health | \
              python3 -c "import sys,json; \
              print(json.load(sys.stdin)['data']['status'])" 2>/dev/null)
            if [ "$STATUS" = "healthy" ]; then
              echo "Healthy after attempt $i"
              exit 0
            fi
            echo "Attempt $i: $STATUS — retrying in 5s"
            sleep 5
          done
          echo "FAIL: service not healthy after 2 minutes"
          exit 1

      - name: Health check
        run: |
          RESPONSE=$(curl -sf ${{ env.API_BASE }}/health)
          STATUS=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['status'])")
          echo "Health: $STATUS"
          [ "$STATUS" = "healthy" ] || exit 1

      - name: Login
        id: auth
        env:
          LOGIN_EMAIL: ${{ secrets.SMOKE_TEST_EMAIL }}
          LOGIN_PASSWORD: ${{ secrets.SMOKE_TEST_PASSWORD }}
        run: |
          RESPONSE=$(curl -sf -X POST ${{ env.API_BASE }}/api/auth/login \
            -H "Content-Type: application/json" \
            -d "{\"email\":\"$LOGIN_EMAIL\",\"password\":\"$LOGIN_PASSWORD\"}")
          SUCCESS=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('success', False))")
          TOKEN=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['token'])")
          echo "Login: $SUCCESS"
          [ "$SUCCESS" = "True" ] || exit 1
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Verify all 6 module dashboards
        env:
          TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          PASS=0
          FAIL=0
          for module in heart-failure electrophysiology coronary-intervention \
            structural-heart valvular-disease peripheral-vascular; do
            RESULT=$(curl -s \
              "${{ env.API_BASE }}/api/modules/$module/dashboard" \
              -H "Authorization: Bearer $TOKEN" | \
              python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          if d.get('success'):
              src=d.get('data',{}).get('source','?')
              print(f'PASS source={src}')
          else:
              print(f'FAIL: {d.get(\"error\",\"unknown\")}')
          " 2>/dev/null)
            echo "$module: $RESULT"
            if echo "$RESULT" | grep -q "^PASS"; then
              PASS=$((PASS + 1))
            else
              FAIL=$((FAIL + 1))
            fi
          done
          echo ""
          echo "Results: $PASS passed, $FAIL failed out of 6 modules"
          [ "$FAIL" -eq 0 ] || exit 1

      - name: Verify module patient endpoints
        env:
          TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          PASS=0
          FAIL=0
          for module in heart-failure electrophysiology coronary-intervention \
            structural-heart valvular-disease peripheral-vascular; do
            RESULT=$(curl -s \
              "${{ env.API_BASE }}/api/modules/$module/patients?limit=3" \
              -H "Authorization: Bearer $TOKEN" | \
              python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          if d.get('success'):
              src=d.get('source','?')
              cnt=d.get('count', len(d.get('data',[])))
              print(f'PASS count={cnt} source={src}')
          else:
              print(f'FAIL: {d.get(\"error\",\"unknown\")}')
          " 2>/dev/null)
            echo "$module/patients: $RESULT"
            if echo "$RESULT" | grep -q "^PASS"; then
              PASS=$((PASS + 1))
            else
              FAIL=$((FAIL + 1))
            fi
          done
          echo ""
          echo "Results: $PASS passed, $FAIL failed out of 6 modules"
          [ "$FAIL" -eq 0 ] || exit 1

      - name: Summary
        if: always()
        run: |
          echo "## Smoke Test Complete" >> $GITHUB_STEP_SUMMARY
          echo "- API: ${{ env.API_BASE }}" >> $GITHUB_STEP_SUMMARY
          echo "- Trigger: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Time: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY
